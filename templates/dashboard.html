<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zoom Bot Control Center</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎯</text></svg>">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<!-- ── Toast container ───────────────────────────────────────────── -->
<div id="toast-container"></div>

<header>
    <div class="header-left">
        <h1>Zoom Bot Control Center</h1>
        <span id="session-timer" class="timer hidden">00:00</span>
    </div>
    <div id="connection-indicator" class="disconnected">Connecting…</div>
</header>

<!-- ── Progress bar ──────────────────────────────────────────────── -->
<div id="progress-wrap" class="hidden">
    <div id="progress-bar"></div>
    <span id="progress-text">0%</span>
</div>

<main>

    <!-- ── Configuration ──────────────────────────────────────────────── -->
    <section id="config-panel" class="panel">
        <h2>Configuration</h2>
        <form id="config-form" autocomplete="off">

            <!-- Section: Meeting -->
            <fieldset class="form-section">
                <legend>Meeting</legend>
                <div class="form-grid cols-4">
                    <div class="form-group span-2">
                        <label for="meeting-id">Meeting ID</label>
                        <input type="text" id="meeting-id" placeholder="123 456 7890" required>
                    </div>
                    <div class="form-group">
                        <label for="passcode">Passcode</label>
                        <input type="text" id="passcode" placeholder="••••••" required>
                    </div>
                    <div class="form-group">
                        <label for="waiting-room-timeout">WR Timeout <span class="hint">(sec)</span></label>
                        <input type="number" id="waiting-room-timeout" min="10" value="60">
                    </div>
                </div>
            </fieldset>

            <!-- Section: Bots -->
            <fieldset class="form-section">
                <legend>Bots</legend>
                <div class="form-grid cols-4">
                    <div class="form-group">
                        <label for="num-bots">Count</label>
                        <input type="number" id="num-bots" min="1" value="1" required>
                    </div>
                    <div class="form-group">
                        <label for="thread-count">Threads</label>
                        <input type="number" id="thread-count" min="1" value="1">
                    </div>
                    <div class="form-group span-2">
                        <label for="custom-name">Name <span class="hint">(blank = random)</span></label>
                        <input type="text" id="custom-name" placeholder="Leave blank for random">
                    </div>
                </div>
            </fieldset>

            <!-- Section: Chat -->
            <fieldset class="form-section">
                <legend>Chat</legend>
                <div class="form-grid cols-4">
                    <div class="form-group span-2">
                        <label for="chat-message">Message <span class="hint">(blank = none)</span></label>
                        <input type="text" id="chat-message" placeholder="Message to send in chat">
                    </div>
                    <div class="form-group">
                        <label for="chat-recipient">Recipient <span class="hint">(blank = Everyone)</span></label>
                        <input type="text" id="chat-recipient" placeholder="Display name">
                    </div>
                    <div class="form-group">
                        <label for="chat-repeat-count">Repeat <span class="hint">(0 = once)</span></label>
                        <input type="number" id="chat-repeat-count" min="0" value="0">
                    </div>
                    <div class="form-group span-2">
                        <label for="chat-repeat-delay">Repeat Delay <span class="hint">(seconds between messages)</span></label>
                        <input type="number" id="chat-repeat-delay" min="0.5" step="0.5" value="2.0">
                    </div>
                </div>
            </fieldset>

            <!-- Section: Reactions -->
            <fieldset class="form-section">
                <legend>Reactions</legend>
                <div class="form-grid cols-4">
                    <div class="form-group span-2">
                        <label>Emojis</label>
                        <div class="checkbox-row" id="reaction-checkboxes">
                            <label><input type="checkbox" value="clap"> Clap</label>
                            <label><input type="checkbox" value="thumbs_up"> Thumbs Up</label>
                            <label><input type="checkbox" value="heart"> Heart</label>
                            <label><input type="checkbox" value="laugh"> Laugh</label>
                            <label><input type="checkbox" value="wow"> Wow</label>
                            <label><input type="checkbox" value="tada"> Tada</label>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="reaction-count">Count</label>
                        <input type="number" id="reaction-count" min="0" value="0">
                    </div>
                    <div class="form-group">
                        <label for="reaction-delay">Delay <span class="hint">(sec)</span></label>
                        <input type="number" id="reaction-delay" min="0.1" step="0.1" value="1.0">
                    </div>
                </div>
            </fieldset>

            <!-- Section: Options (toggles) -->
            <fieldset class="form-section">
                <legend>Options</legend>
                <div class="toggle-grid">
                    <div class="toggle-item">
                        <label class="toggle-label">
                            <input type="checkbox" id="auto-restart">
                            <span class="toggle-text">Auto Restart</span>
                        </label>
                        <div class="toggle-sub">
                            <label for="restart-delay">Delay</label>
                            <input type="number" id="restart-delay" min="1" value="5" class="input-mini">
                            <span class="hint">sec</span>
                        </div>
                    </div>
                    <div class="toggle-item">
                        <label class="toggle-label">
                            <input type="checkbox" id="persist-mode">
                            <span class="toggle-text">Stay in Meeting</span>
                        </label>
                    </div>
                    <div class="toggle-item">
                        <label class="toggle-label">
                            <input type="checkbox" id="use-proxies">
                            <span class="toggle-text">Proxy Rotation</span>
                        </label>
                    </div>
                </div>
            </fieldset>

        </form>
        <div id="controls">
            <button id="btn-start" class="btn btn-start">Start</button>
            <button id="btn-stop" class="btn btn-stop" disabled>Stop</button>
        </div>
    </section>

    <!-- ── Live Stats ────────────────────────────────────────────────── -->
    <section id="stats-panel" class="panel">
        <h2>Live Stats</h2>
        <div class="stat-grid">
            <div class="stat-card stat-green">
                <span class="stat-value" id="stat-joined">0</span>
                <span class="stat-label">Joined</span>
            </div>
            <div class="stat-card stat-red">
                <span class="stat-value" id="stat-failed">0</span>
                <span class="stat-label">Failed</span>
            </div>
            <div class="stat-card">
                <span class="stat-value" id="stat-total">0</span>
                <span class="stat-label">Total</span>
            </div>
            <div class="stat-card stat-blue">
                <span class="stat-value" id="stat-avg">—</span>
                <span class="stat-label">Avg Time</span>
            </div>
            <div class="stat-card stat-blue">
                <span class="stat-value" id="stat-fastest">—</span>
                <span class="stat-label">Fastest</span>
            </div>
            <div class="stat-card stat-blue">
                <span class="stat-value" id="stat-slowest">—</span>
                <span class="stat-label">Slowest</span>
            </div>
        </div>
    </section>

    <!-- ── Bot Status Grid ───────────────────────────────────────────── -->
    <section id="bots-panel" class="panel">
        <h2>Bot Status</h2>
        <div id="bot-grid"></div>
        <p id="bot-placeholder" class="placeholder-text">Bots will appear here once launched.</p>
    </section>

    <!-- ── Two-column: Screenshots + Logs ─────────────────────────────── -->
    <div class="two-col">
        <!-- ── Screenshots ──────────────────────────────────────────── -->
        <section id="screenshots-panel" class="panel">
            <div class="log-header">
                <h2>Screenshots</h2>
                <button id="btn-refresh-screenshots" class="btn-small" title="Refresh">Refresh</button>
            </div>
            <div id="screenshot-grid"></div>
            <p id="screenshot-placeholder" class="placeholder-text">Screenshots appear here during runs.</p>
        </section>

        <!-- ── Log Feed ──────────────────────────────────────────────── -->
        <section id="log-panel" class="panel">
            <div class="log-header">
                <h2>Log Feed</h2>
                <div class="log-toolbar">
                    <button id="btn-clear-logs" class="btn-small" title="Clear logs">Clear</button>
                    <button id="btn-download-logs" class="btn-small" title="Download logs">Download</button>
                </div>
            </div>
            <div id="log-container"></div>
        </section>
    </div>

</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.4/socket.io.min.js"></script>
<script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
